name: Auto Update Waifu

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-waifu:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pick Random Waifu
        id: waifu
        run: |
          FILES=(img/waifu/*.jpg)
          RANDOM_FILE="${FILES[$RANDOM % ${#FILES[@]}]}"
          WAIFU_ID=$(basename "$RANDOM_FILE" .jpg)
          echo "id=$WAIFU_ID" >> $GITHUB_OUTPUT
          echo "Picked: $WAIFU_ID"

      - name: Update README
        run: |
          WAIFU_ID=${{ steps.waifu.outputs.id }}
          COUNTER=$(grep -oP '<!--waifu-\K[0-9]+' README.md | tail -1)
          if [ -z "$COUNTER" ]; then COUNTER=0; fi
          NEXT_COUNTER=$((COUNTER + 1))
          TIMESTAMP=$(TZ='Asia/Jakarta' date '+%d-%m-%Y %H:%M:%S')

          sed -i "s|<!--waifu-[0-9]*-->|<!--waifu-$NEXT_COUNTER-->|g" README.md
          sed -i "s|<img src=\"[^\"]*waifu/[^\"]*\" width|<img src=\"./img/waifu/${WAIFU_ID}.jpg\" width|g" README.md
          sed -i "s|last update: [0-9-]* [0-9:]*|last update: $TIMESTAMP|g" README.md

          echo "fetch_count=$NEXT_COUNTER" >> $GITHUB_ENV
          echo "waifu_id=$WAIFU_ID" >> $GITHUB_ENV

      - name: Commit Changes
        run: |
          git config user.email "elkhaff27@gmail.com"
          git config user.name "elkhaff[bot]"
          git pull
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "update: waifu ke ${{ env.fetch_count }} (${{ env.waifu_id }})"
            git push
          fi
